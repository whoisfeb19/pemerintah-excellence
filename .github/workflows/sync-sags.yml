name: SASG Member Sync

concurrency:
  group: sasg-bot-group
  cancel-in-progress: false

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # ✅ HAPUS cache line - tidak perlu lock file

      - name: Install Dependencies
        run: npm install  # ✅ Ini saja, simple!

      - name: Run SASG Bot
        run: node bot-sasg-fixed.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          BOT_TYPE: sasg
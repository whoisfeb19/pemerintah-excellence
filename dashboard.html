<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASG DASHBOARD</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root { --primary: #e94560; --bg: #1a1a2e; --card: #16213e; --text: #ffffff; --success: #2ecc71; --warning: #f1c40f; --danger: #e74c3c; --info: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        .container { background: var(--card); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 450px; border-top: 5px solid var(--primary); }
        
        .nav-bar { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 10px; }
        .nav-btn { flex: 1; padding: 8px; border: none; border-radius: 5px; cursor: pointer; font-size: 0.8em; font-weight: bold; text-decoration: none; text-align: center; color: white; transition: 0.3s; }
        .btn-logout { background: #444; }
        .btn-admin { background: #f39c12; display: none; border: 2px solid rgba(255,255,255,0.1); }
        .btn-admin:hover { background: #e67e22; transform: translateY(-2px); }

        .salary-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid var(--success);
        }
        .salary-main { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .salary-title { font-size: 0.75em; color: #aaa; }
        .salary-amount { font-size: 1.3em; font-weight: bold; color: var(--success); }
        
        .stats-detail { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }
        .stat-card { text-align: center; }
        .stat-num { display: block; font-weight: bold; font-size: 1.1em; }
        .stat-label { font-size: 0.6em; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .c-hadir { color: var(--success); }
        .c-izin { color: var(--warning); }
        .c-cuti { color: var(--info); }
        .c-alpa { color: var(--danger); }

        h2 { text-align: center; margin: 10px 0 5px 0; text-transform: uppercase; }
        h4 { text-align: center; color: #888; font-weight: normal; margin-bottom: 25px; border-bottom: 1px solid #30475e; padding-bottom: 15px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.85em; color: #aaa; }
        input, textarea, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #30475e; background: #1a1a2e; color: white; box-sizing: border-box; font-family: inherit; }
        
        .date-row, .time-row { display: flex; gap: 10px; }
        .date-row div, .time-row div { flex: 1; }

        button#btn-submit { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; font-size: 16px; }
        button#btn-submit:disabled { background: #555; cursor: not-allowed; }
        
        #status-msg { text-align: center; margin-top: 15px; font-size: 0.9em; font-weight: bold; min-height: 1.5em; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-bar">
        <a href="#" class="nav-btn btn-logout" onclick="logout()">Logout</a>
        <a href="rekap.html" id="admin-link" class="nav-btn btn-admin">Panel Rekap (Admin)</a>
    </div>

    <div id="dashboard-content">
        <h2 id="name-display">Memuat...</h2>
        <h4 id="rank-display">Pangkat | Divisi</h4>

        <div class="salary-box">
            <div class="salary-main">
                <div class="salary-title">Estimasi Gaji Minggu Ini</div>
                <div class="salary-amount" id="gaji-val">$0</div>
            </div>
            <div class="stats-detail">
                <div class="stat-card">
                    <span class="stat-num c-hadir" id="stat-hadir">0</span>
                    <span class="stat-label">Hadir</span>
                </div>
                <div class="stat-card">
                    <span class="stat-num c-izin" id="stat-izin">0</span>
                    <span class="stat-label">Izin</span>
                </div>
                <div class="stat-card">
                    <span class="stat-num c-cuti" id="stat-cuti">0</span>
                    <span class="stat-label">Cuti</span>
                </div>
                <div class="stat-card">
                    <span class="stat-num c-alpa" id="stat-alpa">0</span>
                    <span class="stat-label">Alpa</span>
                </div>
            </div>
        </div>

        <form id="absensi-form">
            <div class="form-group">
                <label>Status Kehadiran</label>
                <select id="status_absen" onchange="toggleFormMode()" required>
                    <option value="HADIR">HADIR (ON DUTY)</option>
                    <option value="IZIN">IZIN (HALANGAN)</option>
                    <option value="CUTI">CUTI (RENTANG WAKTU)</option>
                </select>
            </div>

            <div class="form-group" id="single-date-section">
                <label id="label-tanggal">Tanggal</label>
                <input type="date" id="tanggal_absen">
            </div>

            <div class="form-group" id="range-date-section" style="display:none;">
                <label>Periode Cuti (Mulai - Berakhir)</label>
                <div class="date-row">
                    <div><input type="date" id="cuti_mulai"></div>
                    <div><input type="date" id="cuti_selesai"></div>
                </div>
            </div>

            <div id="hadir-section">
                <div class="form-group">
                    <label>Waktu Duty (Mulai - Selesai)</label>
                    <div class="time-row">
                        <div><input type="time" id="jam_mulai"></div>
                        <div style="display:flex; align-items:center; color:#aaa;">s/d</div>
                        <div><input type="time" id="jam_selesai"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Bukti Foto (SS SAMP)</label>
                    <input type="file" id="bukti_foto" accept="image/*">
                </div>
            </div>

            <div class="form-group">
                <label id="label-kegiatan">Kegiatan / Alasan</label>
                <textarea id="kegiatan" rows="3" placeholder="Deskripsi..." required></textarea>
            </div>

            <button type="submit" id="btn-submit">Kirim Laporan</button>
        </form>
        <div id="status-msg"></div>
    </div>
</div>

<script src="dashboard.js"></script>
</body>
</html>
